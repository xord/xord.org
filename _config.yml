title: xord.org
tagline: Indie apps and open-source libraries.
description: >-
  xord.org — Indie iOS apps and the open-source libraries that power them.
  Creator of RubySketch, RubySolitaire and a handful of open-source libraries.
url: https://xord.org
lang: en

author:
  name: xord
  github: xord
  twitter: xordog

# Social meta for jekyll-seo-tag
twitter:
  username: xordog
  card: summary_large_image
social:
  name: xord.org
  links:
    - https://github.com/xord
    - https://x.com/xordog
    - https://rubygems.org/profiles/xord

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Default layout / language. The root index.md opts into `home` via its own
# front matter, and `ja/index.md` overrides lang to `ja`. Everything else
# (including rubysketch/, rubysolitaire/ support pages) gets wrapped by the
# shared `page` layout in English.
defaults:
  - scope:
      path: ""
    values:
      layout: page
      lang: en

exclude:
  - "*.md~"
  - "**/*.md~"
  - "**/*~"
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor
